name: Test

on: [push, pull_request]

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system GTK dependencies + PyGObject via apt
        # PyGObject is installed via apt (python3-gi) to avoid compiling from source.
        # pip install PyGObject requires libgirepository-2.0-dev and cairo headers
        # which vary across Ubuntu versions — apt is simpler and more reliable in CI.
        run: sudo apt-get install -y python3-gi python3-gi-cairo gir1.2-gtk-3.0

      - name: Install Python dependencies (excluding PyGObject)
        run: pip install Pillow requests

      - name: Test imports (Linux branch)
        # python3-gi is a system package only visible to /usr/bin/python3.
        # We expose it to the hostedtoolcache Python via PYTHONPATH.
        env:
          PYTHONPATH: /usr/lib/python3/dist-packages
        run: |
          python3 -c "
          import gi
          gi.require_version('Gtk', '3.0')
          gi.require_version('Gdk', '3.0')
          from gi.repository import Gtk, Gdk
          import PIL, requests, hashlib, json, sys, time, pathlib
          print('Linux branch imports OK')
          "

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements_win.txt

      - name: Test imports (Windows branch)
        run: |
          python -c "
          import clipboard
          print('Windows branch imports OK')
          "
