name: Test

on: [push, pull_request]

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system GTK dependencies
        run: sudo apt-get install -y python3-gi python3-gi-cairo gir1.2-gtk-3.0

      - name: Install Python dependencies
        run: pip install -r requirements_linux.txt

      - name: Test imports (Linux branch)
        run: |
          python3 -c "
          import sys, types

          # Mock pyperclip to avoid clipboard access in headless CI
          sys.modules['pyperclip'] = types.ModuleType('pyperclip')

          import clipboard
          print('Linux branch imports OK')
          "

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements_win.txt

      - name: Test imports (Windows branch)
        run: |
          python -c "
          import clipboard
          print('Windows branch imports OK')
          "
